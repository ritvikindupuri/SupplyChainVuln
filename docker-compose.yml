x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  packetsentry:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:

  traffic-engine:
    build: ./traffic-engine
    container_name: packetsentry-engine
    environment:
      - DASHBOARD_URL=http://dashboard:5000
    networks:
      - packetsentry
    restart: unless-stopped
    logging: *default-logging

  claude-agent:
    build: ./claude-agent
    container_name: packetsentry-agent
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - MIN_TOOL_CALLS_FOR_COMPLETE=${MIN_TOOL_CALLS_FOR_COMPLETE:-3}
      - DASHBOARD_URL=http://127.0.0.1:5000
    volumes:
      - pcap_storage:/pcaps
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - traffic-engine
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - attack

  dashboard:
    build: ./dashboard
    container_name: packetsentry-dashboard
    ports:
      - "5000:5000"
    environment:
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - AGENT_URL=http://172.30.0.1:8000
    networks:
      - packetsentry
    restart: unless-stopped
    logging: *default-logging

volumes:
  pcap_storage:
