services:
  # ---------------------------------------------------------------------------
  # Core server: GitHub Core Stream + 3 scanner agents + report + dashboard.
  # Holds NO AI keys. Talks to the isolated ai-consensus over the internal net.
  # ---------------------------------------------------------------------------
  core:
    build: ./backend
    container_name: SecureChain-core
    ports:
      - "8000:8000"            # only the core is exposed to the host
    environment:
      - AI_SERVICE_URL=http://ai-consensus:9100
    volumes:
      - ./frontend:/frontend:ro
      - report_storage:/app/reports
    networks:
      - internal
    depends_on:
      - ai-consensus
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ISOLATED AI consensus service: the ONLY container holding the AI keys and
  # the ONLY one that talks to Gemini / Claude. Not published to the host.
  # ---------------------------------------------------------------------------
  ai-consensus:
    build: ./ai-consensus
    container_name: SecureChain-ai
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
    # No `ports:` mapping -> unreachable from the host; internal network only.
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  report_storage:
