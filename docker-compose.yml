version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  packetsentry:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: packetsentry-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-packetsentry}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
      - http.host=0.0.0.0
      - discovery.seed_hosts=[]
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - packetsentry
    healthcheck:
      test: ["CMD", "curl", "-sf", "-u", "elastic:${ELASTIC_PASSWORD:-packetsentry}", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 40s
    logging: *default-logging

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: packetsentry-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-packetsentry}
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
    networks:
      - packetsentry
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5601/api/status"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    logging: *default-logging

  init-setup:
    image: alpine/curl:8.12.0
    container_name: packetsentry-init
    command: >
      sh -c "apk add --no-cache jq bash &&
             bash /init/init.sh"
    volumes:
      - ./elasticsearch/init.sh:/init/init.sh:ro
    networks:
      - packetsentry
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-packetsentry}
    restart: "no"

  traffic-engine:
    build: ./traffic-engine
    container_name: packetsentry-engine
    environment:
      - DASHBOARD_URL=http://dashboard:5000
    networks:
      - packetsentry
    restart: unless-stopped
    logging: *default-logging

  claude-agent:
    build: ./claude-agent
    container_name: packetsentry-agent
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - ES_URL=http://127.0.0.1:9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-packetsentry}
      - DASHBOARD_URL=http://127.0.0.1:5000
    volumes:
      - pcap_storage:/pcaps
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - elasticsearch
      - traffic-engine
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - attack

  dashboard:
    build: ./dashboard
    container_name: packetsentry-dashboard
    ports:
      - "5000:5000"
    environment:
      - ES_URL=http://elasticsearch:9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-packetsentry}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - AGENT_URL=http://172.30.0.1:8000
    networks:
      - packetsentry
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

volumes:
  es_data:
  pcap_storage:
