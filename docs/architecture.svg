  <text x="750" y="593" font-size="10" font-weight="bold" fill="#FFFFFF">⑥</text>
  <text x="807" y="590" font-size="9" fill="#2563EB">Visualize</text>
  <text x="807" y="605" font-size="8" fill="#94A3B8">Query both</text>

