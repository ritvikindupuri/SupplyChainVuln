  <rect x="940" y="85" width="180" height="70" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="955" y="105" font-size="11" font-weight="bold" fill="#7C3AED">⚡ FalcoSidekick UI</text>
  <text x="955" y="125" font-size="10" fill="#64748B">http://localhost:2802</text>

