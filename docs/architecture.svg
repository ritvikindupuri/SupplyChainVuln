  <line x1="600" y1="710" x2="600" y2="155" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="568" y="420" width="65" height="16" rx="4" fill="#94A3B8"/>
  <text x="572" y="432" font-size="9" font-weight="bold" fill="#FFFFFF">9200</text>

  <!-- Falcosidekick: 2802 -->
  <line x1="692" y1="450" x2="692" y2="155" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="660" y="180" width="65" height="16" rx="4" fill="#94A3B8"/>
  <text x="664" y="192" font-size="9" font-weight="bold" fill="#FFFFFF">2802</text>

