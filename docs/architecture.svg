  <path d="M 157 410 L 157 630 L 495 708" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <rect x="125" y="580" width="55" height="18" rx="9" fill="#DC2626"/>
  <text x="130" y="593" font-size="10" font-weight="bold" fill="#FFFFFF">⑤</text>
  <text x="187" y="593" font-size="9" fill="#DC2626">Push logs</text>
  <text x="187" y="608" font-size="8" fill="#94A3B8">attack-logs-*</text>

