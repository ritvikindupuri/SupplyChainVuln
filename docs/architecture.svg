  <text x="855" y="478" font-size="14" font-weight="bold" fill="#FFFFFF">AUTO SETUP</text>
  <text x="855" y="496" font-size="10" fill="#D1D5DB">(init-setup, profile: setup)</text>
  <text x="855" y="514" font-size="11" fill="#D1D5DB">One-time — Exits on completion</text>
  <text x="855" y="536" font-size="10" fill="#9CA3AF" font-style="italic">Creates ES templates + Kibana data views</text>

