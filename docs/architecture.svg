  <!-- ① AI Attacker → Vuln Web App -->
  <line x1="255" y1="310" x2="308" y2="310" stroke="#DC2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <rect x="256" y="295" width="55" height="18" rx="9" fill="#DC2626"/>
  <text x="261" y="308" font-size="10" font-weight="bold" fill="#FFFFFF">①</text>
