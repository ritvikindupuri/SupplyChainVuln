<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#DC2626"/>
    </marker>
    <linearGradient id="layer1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFBFC"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSmall" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="950" fill="#FFFFFF"/>

  <!-- ═══════════════ LAYER 3: DATA LAYER (bottom) ═══════════════ -->
  <rect x="30" y="640" width="1140" height="280" rx="8" fill="url(#layer3)" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="50" y="672" font-size="16" font-weight="bold" fill="#475569">DATA LAYER</text>
  <text x="50" y="692" font-size="11" fill="#94A3B8">Log storage and search infrastructure</text>

  <!-- Elasticsearch Box -->
  <rect x="350" y="710" width="500" height="180" rx="10" fill="#2563EB" filter="url(#shadow)"/>
  <text x="380" y="745" font-size="18" font-weight="bold" fill="#FFFFFF">ELASTICSEARCH 8.12.0</text>
  <text x="380" y="767" font-size="12" fill="#BFDBFE">Log Storage — Port 9200 (REST API)</text>

  <!-- ES Sub-boxes -->
  <rect x="380" y="785" width="210" height="80" rx="6" fill="#FBBF24" stroke="#D97706" stroke-width="1"/>
  <text x="390" y="810" font-size="11" font-weight="bold" fill="#92400E">Index: attack-logs-*</text>
  <text x="390" y="828" font-size="10" fill="#92400E">Attacker records + Claude AI analysis</text>
  <text x="390" y="848" font-size="9" fill="#A16207">10 fields: attack_name, technique,</text>
  <text x="390" y="862" font-size="9" fill="#A16207">status, severity, analysis, raw_output...</text>

  <rect x="610" y="785" width="210" height="80" rx="6" fill="#FBBF24" stroke="#D97706" stroke-width="1"/>
  <text x="620" y="810" font-size="11" font-weight="bold" fill="#92400E">Index: falco-events-*</text>
  <text x="620" y="828" font-size="10" fill="#92400E">Falco syscall detection alerts</text>
  <text x="620" y="848" font-size="9" fill="#A16207">15 fields: rule, priority, container.*,</text>
  <text x="620" y="862" font-size="9" fill="#A16207">proc.*, evt.*, fd.name, tags...</text>

  <!-- ═══════════════ LAYER 2: CONTAINER PLATFORM (middle) ═══════════════ -->
  <rect x="30" y="180" width="1140" height="460" rx="8" fill="url(#layer2)" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="30" y="180" width="1140" height="460" rx="8" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="50" y="212" font-size="16" font-weight="bold" fill="#475569">CONTAINER PLATFORM</text>
  <text x="50" y="232" font-size="11" fill="#94A3B8">Docker Compose — Network: pentest-net (bridge)</text>

  <!-- Phase 2 badge -->
  <rect x="930" y="195" width="220" height="40" rx="20" fill="#FEF2C0" stroke="#D97706" stroke-width="1"/>
  <text x="940" y="210" font-size="10" font-weight="bold" fill="#92400E">PHASE 2: docker compose --profile attack up -d attacker</text>
  <text x="940" y="225" font-size="9" fill="#A16207">Starts attacker. All UIs populate in real-time.</text>

  <!-- ─── Service Box: AI Attacker ─── -->
  <rect x="60" y="260" width="195" height="150" rx="8" fill="#DC2626" filter="url(#shadow)"/>
  <text x="75" y="290" font-size="14" font-weight="bold" fill="#FFFFFF">AI ATTACKER</text>
  <line x1="75" y1="300" x2="240" y2="300" stroke="#EF4444" stroke-width="1"/>
  <text x="75" y="320" font-size="11" fill="#FECACA">Claude-Powered</text>
  <text x="75" y="338" font-size="11" fill="#FECACA">10 Attack Scenarios</text>
  <text x="75" y="356" font-size="11" fill="#FECACA">Pushes to ES + live events</text>
  <text x="75" y="380" font-size="10" fill="#FCA5A5" font-style="italic">(Phase 2 only — profile: attack)</text>

  <!-- ─── Service Box: Vulnerable Web App ─── -->
  <rect x="310" y="260" width="230" height="150" rx="8" fill="#EA580C" filter="url(#shadow)"/>
  <text x="325" y="290" font-size="14" font-weight="bold" fill="#FFFFFF">VULNERABLE WEB APP</text>
  <line x1="325" y1="300" x2="525" y2="300" stroke="#F97316" stroke-width="1"/>
  <text x="325" y="320" font-size="11" fill="#FED7AA">Flask 3.0 — Port 8080</text>
  <text x="325" y="338" font-size="11" fill="#FED7AA">Live System Metrics UI</text>
  <text x="325" y="356" font-size="11" fill="#FED7AA">Attack Event Feed</text>
  <text x="325" y="380" font-size="10" fill="#FDBA74" font-style="italic">CAP_SYS_ADMIN, seccomp=unconfined</text>
  <text x="325" y="395" font-size="10" fill="#FDBA74" font-style="italic">/var/run/docker.sock mounted</text>

  <!-- ─── Service Box: Falco ─── -->
  <rect x="595" y="260" width="195" height="150" rx="8" fill="#7C3AED" filter="url(#shadow)"/>
  <text x="610" y="290" font-size="14" font-weight="bold" fill="#FFFFFF">FALCO</text>
  <line x1="610" y1="300" x2="775" y2="300" stroke="#A855F7" stroke-width="1"/>
  <text x="610" y="320" font-size="11" fill="#DDD6FE">Runtime Security Monitor</text>
  <text x="610" y="338" font-size="11" fill="#DDD6FE">20+ Custom Rules</text>
  <text x="610" y="356" font-size="11" fill="#DDD6FE">MITRE ATT&amp;CK Tagged</text>
  <text x="610" y="380" font-size="10" fill="#C4B5FD" font-style="italic">Privileged mode</text>
  <text x="610" y="395" font-size="10" fill="#C4B5FD" font-style="italic">Host /proc + /boot mounted</text>

  <!-- ─── Service Box: Falcosidekick ─── -->
  <rect x="595" y="450" width="195" height="100" rx="8" fill="#7C3AED" filter="url(#shadow)"/>
  <text x="610" y="478" font-size="14" font-weight="bold" fill="#FFFFFF">FALCOSIDEKICK</text>
  <text x="610" y="498" font-size="11" fill="#DDD6FE">Event Forwarder</text>
  <text x="610" y="516" font-size="11" fill="#DDD6FE">Port 2801 (webhook) + 2802 (UI)</text>

  <!-- ─── Service Box: Kibana ─── -->
  <rect x="840" y="260" width="195" height="150" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="855" y="290" font-size="14" font-weight="bold" fill="#FFFFFF">KIBANA 8.12.0</text>
  <line x1="855" y1="300" x2="1020" y2="300" stroke="#60A5FA" stroke-width="1"/>
  <text x="855" y="320" font-size="11" fill="#BFDBFE">Visualization Dashboard</text>
  <text x="855" y="338" font-size="11" fill="#BFDBFE">Port 5601</text>
  <text x="855" y="356" font-size="11" fill="#BFDBFE">Data Views:</text>
  <text x="855" y="374" font-size="11" fill="#BFDBFE">"Attack Logs" + "Falco Events"</text>
  <text x="855" y="395" font-size="10" fill="#93C5FD" font-style="italic">Pre-configured by init-setup</text>

  <!-- ─── Service Box: Security Dashboard ─── -->
  <rect x="310" y="450" width="230" height="100" rx="8" fill="#059669" filter="url(#shadow)"/>
  <text x="325" y="478" font-size="14" font-weight="bold" fill="#FFFFFF">SECURITY DASHBOARD</text>
  <text x="325" y="498" font-size="11" fill="#A7F3D0">Flask 3.0 — Port 5000</text>
  <text x="325" y="516" font-size="11" fill="#A7F3D0">Reports + Remediation Agent (SSE)</text>

  <!-- ─── Service Box: Auto Setup ─── -->
