<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 870" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0090ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="box-infra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="box-agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a2f"/>
      <stop offset="100%" stop-color="#0f2919"/>
    </linearGradient>
    <linearGradient id="box-dash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5f"/>
      <stop offset="100%" stop-color="#0f2949"/>
    </linearGradient>
    <linearGradient id="box-attack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1a1a"/>
      <stop offset="100%" stop-color="#290f0f"/>
    </linearGradient>
    <linearGradient id="box-custom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0f1a29"/>
    </linearGradient>
    <linearGradient id="box-report" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a3a"/>
      <stop offset="100%" stop-color="#1a0f29"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00e676"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#448aff"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff1744"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9100"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b388ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="870" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="url(#header)" font-size="22" font-weight="700" filter="url(#glow)">PacketSentry Architecture</text>
  <text x="550" y="56" text-anchor="middle" fill="#5a6a7a" font-size="11">Autonomous AI Network Security Platform</text>

  <!-- Layer Labels -->
  <text x="20" y="95" fill="#00e676" font-size="10" font-weight="700">LAYER 1: ATTACK GENERATION</text>
  <line x1="20" y1="100" x2="1080" y2="100" stroke="#00e676" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Custom Target Box -->
  <rect x="60" y="110" width="240" height="110" rx="10" fill="url(#box-custom)" stroke="#3a6a9a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="110" width="240" height="28" rx="10" fill="#1a3a5f"/>
  <rect x="60" y="128" width="240" height="10" fill="#1a3a5f"/>
  <text x="180" y="130" text-anchor="middle" fill="#5ab0ff" font-size="11" font-weight="600">Your Custom Web App</text>
  <text x="180" y="153" text-anchor="middle" fill="#9aaaba" font-size="10">User-provided URL</text>
  <text x="180" y="170" text-anchor="middle" fill="#5a6a7a" font-size="9">localhost / LAN / Netlify / Vercel</text>
  <text x="80" y="190" fill="#448aff" font-size="12">⬤</text>
  <text x="96" y="190" fill="#7a8a9a" font-size="9">Target for all attack traffic</text>
  <text x="80" y="207" fill="#ffab00" font-size="10">⚡</text>
  <text x="96" y="207" fill="#7a8a9a" font-size="9">Validated by dashboard rules</text>

  <!-- Traffic Engine Box -->
  <rect x="340" y="110" width="280" height="110" rx="10" fill="url(#box-attack)" stroke="#5f1a1a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="340" y="110" width="280" height="28" rx="10" fill="#3a1a1a"/>
  <rect x="340" y="128" width="280" height="10" fill="#3a1a1a"/>
  <text x="480" y="130" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="600">Traffic Engine</text>
  <text x="480" y="153" text-anchor="middle" fill="#ce9a9a" font-size="10">nmap / hping3 / Python</text>
  <text x="480" y="170" text-anchor="middle" fill="#8a5a5a" font-size="9">Normal traffic + Attack scheduler</text>
  <text x="360" y="190" fill="#ff9100" font-size="11">⚠</text>
  <text x="376" y="190" fill="#ce7a5a" font-size="9">SYN flood | Port scan | Slowloris</text>
  <text x="360" y="207" fill="#ce7a5a" font-size="9">DNS amp | Dir bust | TCP scan</text>

  <!-- Attack Arrow to Custom Target -->
  <line x1="340" y1="140" x2="300" y2="140" stroke="#ff1744" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)" opacity="0.7"/>
  <text x="280" y="92" text-anchor="middle" fill="#ff6b6b" font-size="9" font-style="italic">① Attacks + Normal traffic</text>

  <!-- Traffic Engine polls Dashboard for target -->
  <path d="M 620 160 L 780 160 L 780 575 L 830 575" fill="none" stroke="#ff9100" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-orange)" opacity="0.6"/>
  <text x="700" y="152" text-anchor="middle" fill="#8a6a3a" font-size="9">⑨ Poll /api/target (every 8s)</text>

  <!-- Layer 2: AI Agent -->
  <text x="20" y="270" fill="#00d4ff" font-size="10" font-weight="700">LAYER 2: AI ANALYSIS</text>
  <line x1="20" y1="275" x2="1080" y2="275" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Claude Agent Box -->
  <rect x="100" y="290" width="510" height="160" rx="12" fill="url(#box-agent)" stroke="#1a6a4a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="290" width="510" height="32" rx="12" fill="#1a4a3a"/>
  <rect x="100" y="312" width="510" height="10" fill="#1a4a3a"/>
  <text x="355" y="312" text-anchor="middle" fill="#00e676" font-size="13" font-weight="700">Claude AI Security Agent</text>

  <!-- Agent sub-components -->
  <rect x="120" y="338" width="140" height="50" rx="6" fill="#0f2919" stroke="#1a5a3a" stroke-width="1"/>
  <text x="190" y="358" text-anchor="middle" fill="#9aaaba" font-size="10" font-weight="600">Packet Capture</text>
  <text x="190" y="375" text-anchor="middle" fill="#5a7a6a" font-size="9">tshark -i any</text>

  <rect x="275" y="338" width="140" height="50" rx="6" fill="#0f2919" stroke="#1a5a3a" stroke-width="1"/>
  <text x="345" y="358" text-anchor="middle" fill="#9aaaba" font-size="10" font-weight="600">Attack Detection</text>
  <text x="345" y="375" text-anchor="middle" fill="#5a7a6a" font-size="9">Pattern matching</text>

  <rect x="430" y="338" width="160" height="50" rx="6" fill="#0f2919" stroke="#1a5a3a" stroke-width="1"/>
  <text x="510" y="358" text-anchor="middle" fill="#9aaaba" font-size="10" font-weight="600">Claude Analysis</text>
  <text x="510" y="375" text-anchor="middle" fill="#5a7a6a" font-size="9">claude-sonnet-4-6</text>

  <rect x="120" y="398" width="220" height="36" rx="6" fill="#0f2919" stroke="#1a5a3a" stroke-width="1"/>
  <text x="230" y="420" text-anchor="middle" fill="#9aaaba" font-size="10">HTTP Query API (port 8000)</text>

  <rect x="360" y="398" width="230" height="36" rx="6" fill="#0f2919" stroke="#1a5a3a" stroke-width="1"/>
  <text x="475" y="420" text-anchor="middle" fill="#9aaaba" font-size="10">"Ask the Agent" chat handler</text>

  <text x="120" y="345" fill="#00e676" font-size="10">🔍</text>
  <text x="275" y="345" fill="#ffab00" font-size="10">⚡</text>
  <text x="430" y="345" fill="#448aff" font-size="10">🧠</text>

  <!-- Agent stats bar -->
  <rect x="630" y="290" width="260" height="160" rx="10" fill="url(#box-infra)" stroke="#1e3a5f" stroke-width="1" filter="url(#shadow)"/>
  <text x="760" y="312" text-anchor="middle" fill="#5ab0ff" font-size="11" font-weight="600">Agent Capabilities</text>
  <text x="650" y="338" fill="#00e676" font-size="10">✓</text>
  <text x="666" y="338" fill="#9aaaba" font-size="10">Live packet capture (all interfaces)</text>
  <text x="650" y="358" fill="#00e676" font-size="10">✓</text>
  <text x="666" y="358" fill="#9aaaba" font-size="10">6 attack signature patterns</text>
  <text x="650" y="378" fill="#00e676" font-size="10">✓</text>
  <text x="666" y="378" fill="#9aaaba" font-size="10">Claude AI threat analysis (streaming)</text>
  <text x="650" y="398" fill="#00e676" font-size="10">✓</text>
  <text x="666" y="398" fill="#9aaaba" font-size="10">MITRE ATT&amp;CK mapping</text>
  <text x="650" y="418" fill="#00e676" font-size="10">✓</text>
  <text x="666" y="418" fill="#9aaaba" font-size="10">Autonomous stop (analysis_complete)</text>
  <text x="650" y="438" fill="#00e676" font-size="10">✓</text>
  <text x="666" y="438" fill="#9aaaba" font-size="10">Real-time ES + Dashboard push</text>

  <!-- Arrow from custom target to agent (tshark captures traffic to/from target) -->
  <path d="M 180 220 L 180 260 L 235 260 L 235 290" fill="none" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrow-green)" opacity="0.6"/>
  <text x="155" y="260" fill="#5a7a6a" font-size="9" transform="rotate(-90,150,260)">② Captured via host networking (tshark)</text>

  <!-- Layer 3: Storage & UI -->
  <text x="20" y="500" fill="#ff9100" font-size="10" font-weight="700">LAYER 3: STORAGE &amp; VISUALIZATION</text>
  <line x1="20" y1="505" x2="1080" y2="505" stroke="#ff9100" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Elasticsearch Box -->
  <rect x="60" y="520" width="230" height="110" rx="10" fill="url(#box-infra)" stroke="#1e3a5f" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="520" width="230" height="28" rx="10" fill="#1e3a5f"/>
  <rect x="60" y="538" width="230" height="10" fill="#1e3a5f"/>
  <text x="175" y="540" text-anchor="middle" fill="#5ab0ff" font-size="11" font-weight="600">Elasticsearch</text>
  <text x="175" y="563" text-anchor="middle" fill="#9aaaba" font-size="10">Index: packetsentry-alerts-*</text>
  <text x="175" y="580" text-anchor="middle" fill="#9aaaba" font-size="10">Index: packetsentry-packets-*</text>
  <text x="175" y="600" text-anchor="middle" fill="#5a6a7a" font-size="9">packetsentry-es:9200</text>
  <text x="175" y="617" text-anchor="middle" fill="#5a6a7a" font-size="9">elastic / packetsentry</text>

  <!-- Kibana Box -->
  <rect x="320" y="520" width="200" height="110" rx="10" fill="url(#box-infra)" stroke="#1e3a5f" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="320" y="520" width="200" height="28" rx="10" fill="#1e3a5f"/>
  <rect x="320" y="538" width="200" height="10" fill="#1e3a5f"/>
  <text x="420" y="540" text-anchor="middle" fill="#5ab0ff" font-size="11" font-weight="600">Kibana</text>
  <text x="420" y="563" text-anchor="middle" fill="#9aaaba" font-size="10">Data visualization</text>
  <text x="420" y="580" text-anchor="middle" fill="#9aaaba" font-size="10">Alert dashboards</text>
  <text x="420" y="600" text-anchor="middle" fill="#5a6a7a" font-size="9">packetsentry-kibana:5601</text>

  <!-- Dashboard Box -->
  <rect x="550" y="520" width="280" height="110" rx="10" fill="url(#box-dash)" stroke="#1a4a7f" stroke-width="2" filter="url(#shadow)"/>
  <rect x="550" y="520" width="280" height="28" rx="10" fill="#1a3a6f"/>
  <rect x="550" y="538" width="280" height="10" fill="#1a3a6f"/>
  <text x="690" y="540" text-anchor="middle" fill="#5ab0ff" font-size="11" font-weight="700">Web Dashboard</text>
  <text x="690" y="563" text-anchor="middle" fill="#9aaaba" font-size="10">Setup URL | Live packets | Alerts</text>
  <text x="690" y="580" text-anchor="middle" fill="#9aaaba" font-size="10">Agent Console | Reports | Chat</text>
  <text x="570" y="600" fill="#00d4ff" font-size="10">⬤</text>
  <text x="586" y="600" fill="#7a8a9a" font-size="9">packetsentry-dashboard:5000</text>
  <text x="570" y="618" fill="#ffab00" font-size="10">⚡</text>
  <text x="586" y="618" fill="#7a8a9a" font-size="9">SSE real-time streaming</text>

  <!-- Report Generator Box -->
  <rect x="860" y="520" width="200" height="110" rx="10" fill="url(#box-report)" stroke="#5a2a8a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="860" y="520" width="200" height="28" rx="10" fill="#3a1a5f"/>
  <rect x="860" y="538" width="200" height="10" fill="#3a1a5f"/>
  <text x="960" y="540" text-anchor="middle" fill="#b388ff" font-size="11" font-weight="600">Report Generator</text>
  <text x="960" y="563" text-anchor="middle" fill="#ce9ada" font-size="10">Queries ES → Calls Claude</text>
  <text x="960" y="580" text-anchor="middle" fill="#9a6aba" font-size="10">→ Produces PDF</text>
  <text x="960" y="600" text-anchor="middle" fill="#7a5a9a" font-size="9">Claude-generated content</text>
  <text x="960" y="617" text-anchor="middle" fill="#7a5a9a" font-size="9">Professional FAANG-style layout</text>

  <!-- Agent to ES Arrow -->
  <path d="M 355 450 L 355 490 L 175 490 L 175 520" fill="none" stroke="#448aff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <text x="265" y="502" text-anchor="middle" fill="#5a7a9a" font-size="9">③ Push alerts + packets + activity</text>

  <!-- Agent to Dashboard Arrow -->
  <path d="M 475 450 L 475 490 L 690 490 L 690 520" fill="none" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <text x="580" y="502" text-anchor="middle" fill="#5a7a9a" font-size="9">④ SSE events + analysis</text>

  <!-- ES to Kibana Arrow -->
  <path d="M 290 575 L 320 575" fill="none" stroke="#448aff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.5"/>

  <!-- Dashboard to Kibana proxy arrow -->
  <path d="M 550 595 L 520 595" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-blue)" opacity="0.6"/>
  <text x="535" y="587" text-anchor="middle" fill="#5a7a9a" font-size="8">⑧ Proxy /kibana/</text>

  <!-- Dashboard to Report Generator arrow -->
  <path d="M 830 570 L 860 570" fill="none" stroke="#b388ff" stroke-width="1.5" marker-end="url(#arrow-purple)" opacity="0.7"/>
  <text x="845" y="562" text-anchor="middle" fill="#8a6aba" font-size="8">⑦ Generate</text>

  <!-- Dashboard to Agent query arrow -->
  <path d="M 690 520 L 690 490 L 590 490 L 590 450" fill="none" stroke="#ff9100" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-orange)" opacity="0.6"/>
  <text x="718" y="502" text-anchor="middle" fill="#8a6a3a" font-size="9">⑤ User queries (Ask Agent chat)</text>

  <!-- User / Client on left -->
  <rect x="60" y="700" width="160" height="60" rx="30" fill="none" stroke="#3a5a7a" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="140" y="730" text-anchor="middle" fill="#5a7a9a" font-size="10">👤 Security Analyst</text>
  <text x="140" y="747" text-anchor="middle" fill="#4a5a6a" font-size="9">(You)</text>

  <line x1="140" y1="700" x2="140" y2="660" stroke="#448aff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.5"/>
  <line x1="690" y1="660" x2="690" y2="700" fill="none" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.5"/>
  <text x="415" y="688" text-anchor="middle" fill="#4a5a6a" font-size="9">⑥ Access dashboard at http://localhost:5000</text>

  <!-- Multi-session annotation -->
  <path d="M 690 630 L 690 650 L 960 650 L 960 630" fill="none" stroke="#ffab00" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-orange)" opacity="0.4"/>
  <text x="825" y="668" text-anchor="middle" fill="#6a5a3a" font-size="9">"Start New Session" → Agent resets, waits for new target</text>

  <!-- Phase annotations -->
  <rect x="850" y="80" width="210" height="50" rx="8" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="955" y="100" text-anchor="middle" fill="#ffab00" font-size="10" font-weight="600">Phase 1 - Infrastructure</text>
  <text x="955" y="118" text-anchor="middle" fill="#5a6a7a" font-size="9">docker compose up -d</text>

  <rect x="850" y="140" width="210" height="50" rx="8" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="955" y="160" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">Phase 2 - Agent Attack</text>
  <text x="955" y="178" text-anchor="middle" fill="#5a6a7a" font-size="9">docker compose --profile attack up -d</text>

  <!-- Legend -->
  <rect x="850" y="240" width="210" height="130" rx="8" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="955" y="260" text-anchor="middle" fill="#9aaaba" font-size="10" font-weight="600">Legend</text>
  <line x1="870" y1="278" x2="910" y2="278" stroke="#ff1744" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="920" y="282" fill="#7a8a9a" font-size="9">Attack traffic</text>
  <line x1="870" y1="298" x2="910" y2="298" stroke="#00e676" stroke-width="1.5"/>
  <text x="920" y="302" fill="#7a8a9a" font-size="9">Network capture</text>
  <line x1="870" y1="318" x2="910" y2="318" stroke="#448aff" stroke-width="1.5"/>
  <text x="920" y="322" fill="#7a8a9a" font-size="9">Data push</text>
  <line x1="870" y1="338" x2="910" y2="338" stroke="#ff9100" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="920" y="342" fill="#7a8a9a" font-size="9">User queries / Polling</text>
  <line x1="870" y1="358" x2="910" y2="358" stroke="#b388ff" stroke-width="1.5"/>
  <text x="920" y="362" fill="#7a8a9a" font-size="9">Report generation</text>

  <!-- Bottom bar -->
  <rect x="0" y="830" width="1100" height="40" fill="#0d1224"/>
  <text x="550" y="855" text-anchor="middle" fill="#3a4a5a" font-size="9">PacketSentry v1.0 — Built with Claude API + Wireshark/tshark + Docker</text>
</svg>
