  <rect x="30" y="620" width="240" height="18" rx="4" fill="#FEF2C0" stroke="#D97706" stroke-width="1"/>
  <text x="38" y="633" font-size="9" fill="#92400E">Phase 1 starts everything except the attacker</text>

