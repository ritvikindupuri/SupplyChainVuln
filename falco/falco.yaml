# Falco Configuration
# Custom rules file loaded at /etc/falco/rules.d/custom-rules.yaml

# Priority at which Falco will log to the log file/alerts
priority: debug

# Whether to output events in JSON format
json_output: true
json_include_output_property: true

# Where to send alerts
log_output:
  enabled: true
  severity: info

program_output:
  enabled: true
  keep_alive: false
  program: "curl -fsS -XPOST http://falcosidekick:2801/ -d @- || true"

http_output:
  enabled: true
  url: http://falcosidekick:2801/
  insecure: true

file_output:
  enabled: true
  filename: /var/log/falco_events.log
  keep_alive: false

# Watchlist for containers - we want to see everything
containers:
  enabled: true

# Syscall event buffer
syscall_event_drops:
  threshold: 0.1
  actions:
    - log
    - alert
  rate: 0.001
  max_burst: 1000

syscall_event_timeout:
  max: 200

# Output format
output_fields:
  - event.id
  - evt.time
  - container.id
  - container.name
  - container.image
  - k8s.ns.name
  - k8s.pod.name
  - fd.name
  - proc.name
  - proc.pid
  - proc.cmdline
  - proc.cwd
  - proc.exepath
  - proc.tty
  - user.name
  - user.uid
  - group.name
  - group.gid
  - evt.type
  - evt.arg
  - evt.res
  - evt.dir

# Watchlist for specific containers we care about
watchlist:
  - container_name: vuln-app
    severity: DEBUG
  - container_name: ai-attacker
    severity: DEBUG
