- required_engine_version: 6

# ── Container Escape Detection Rules ──────────────────────

- rule: Docker Socket Mounted in Container
  desc: Detect when the Docker socket is mounted inside a container (potential escape vector)
  condition: >
    open_read and fd.name startswith /var/run/docker.sock
    and container.id != host
  output: >
    DOCKER SOCKET ACCESSED (user=%user.name container=%container.name
    image=%container.image pid=%proc.pid cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [container, escape, mitre_privilege_escalation]

- rule: Privileged Container Detected
  desc: Detect when a container is running in privileged mode
  condition: >
    evt.type=container and container.privileged=true
  output: >
    PRIVILEGED CONTAINER DETECTED (container=%container.name
    image=%container.image id=%container.id)
  priority: CRITICAL
  tags: [container, misconfiguration, mitre_privilege_escalation]

- rule: CAP_SYS_ADMIN Capability Detected
  desc: Detect containers with CAP_SYS_ADMIN which allows host filesystem mount
  condition: >
    evt.type=container and container.id != host
    and container.image != "" and container.sys_admin=true
  output: >
    CAP_SYS_ADMIN DETECTED in container (container=%container.name
    image=%container.image id=%container.id)
  priority: HIGH
  tags: [container, capability, mitre_privilege_escalation]

- rule: Mount Syscall From Container
  desc: Detect mount syscall from within a container (potential escape)
  condition: >
    evt.type=mount and container.id != host
  output: >
    MOUNT SYSCALL IN CONTAINER (user=%user.name container=%container.name
    image=%container.image pid=%proc.pid cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [container, escape, syscall, mitre_privilege_escalation]

- rule: Unshare Syscall From Container
  desc: Detect unshare syscall (namespace creation) from within a container
  condition: >
    evt.type=unshare and container.id != host
    and evt.dir=<
  output: >
    UNSHARE SYSCALL IN CONTAINER (user=%user.name container=%container.name
    image=%container.image pid=%proc.pid cmdline=%proc.cmdline)
  priority: HIGH
  tags: [container, escape, syscall, mitre_privilege_escalation]

- rule: Cgroup Release Agent Modification
  desc: Detect modification of cgroup release_agent (classic container escape)
  condition: >
    (open_write or evt.type=write)
    and fd.name endswith release_agent
    and container.id != host
  output: >
    CGROUP RELEASE_AGENT MODIFICATION (file=%fd.name container=%container.name
    image=%container.image pid=%proc.pid cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [container, escape, cgroup, mitre_privilege_escalation]

- rule: Read Sensitive Host File Through /proc/1/root
  desc: Detect reads of sensitive host files through /proc/1/root from container
  condition: >
    open_read and
    (fd.name startswith /proc/1/root/etc/shadow or
     fd.name startswith /proc/1/root/root/.ssh or
     fd.name startswith /proc/1/root/var/lib/docker or
     fd.name startswith /proc/1/root/.docker)
    and container.id != host
  output: >
    HOST FILE READ VIA PROCFS (file=%fd.name container=%container.name
    image=%container.image pid=%proc.pid cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [container, escape, procfs, mitre_discovery]

- rule: Core Host File Access From Container
  desc: Detect direct access to host shadow, SSH keys, or Kubernetes secrets
  condition: >
    open_read and
    (fd.name endswith shadow or
     fd.name startswith /root/.ssh or
     fd.name startswith /etc/kubernetes)
    and container.id != host
  output: >
    SENSITIVE HOST FILE ACCESS (file=%fd.name container=%container.name
    image=%container.image pid=%proc.pid cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [container, credentials, mitre_credential_access]

- rule: Host PID Namespace Container
  desc: Detect containers sharing host PID namespace
  condition: >
    evt.type=container and container.id != host
    and container.pid_mode=host
  output: >
    HOST PID NS CONTAINER (container=%container.name image=%container.image
    id=%container.id)
  priority: HIGH
  tags: [container, misconfiguration, mitre_privilege_escalation]

- rule: Container Network Scanning
  desc: Detect port scanning or network reconnaissance from inside a container
  condition: >
    evt.type=connect and container.id != host
    and evt.dir=<
    and (fd.sport=22 or fd.sport=80 or fd.sport=443 or fd.sport=2375
         or fd.sport=6443 or fd.sport=9200 or fd.sport=5601)
    and evt.failed=false
  output: >
    CONTAINER NETWORK CONNECT (container=%container.name
    image=%container.image pid=%proc.pid cmdline=%proc.cmdline
    fd=%fd.name)
  priority: WARNING
  tags: [container, network, discovery, mitre_discovery]

- rule: Write to Host SSH Authorized Keys
  desc: Detect attempts to write SSH authorized_keys from container
  condition: >
    open_write and fd.name endswith authorized_keys
    and container.id != host
  output: >
    SSH AUTHORIZED KEYS WRITE FROM CONTAINER (file=%fd.name
    container=%container.name pid=%proc.pid cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [container, persistence, mitre_persistence]

- rule: Seccomp Unconfined Container
  desc: Detect containers running with seccomp unconfined
  condition: >
    evt.type=container and container.id != host
    and container.seccomp=unconfined
  output: >
    SECCOMP UNCONFINED CONTAINER (container=%container.name
    image=%container.image id=%container.id)
  priority: HIGH
  tags: [container, misconfiguration, mitre_defense_evasion]

- rule: Raw Socket Created in Container
  desc: Detect creation of raw sockets (network namespace escape attempts)
  condition: >
    evt.type=socket and evt.dir=<
    and container.id != host
    and evt.arg[type]=3
  output: >
    RAW SOCKET CREATED (container=%container.name image=%container.image
    pid=%proc.pid cmdline=%proc.cmdline)
  priority: HIGH
  tags: [container, network, mitre_discovery]

- rule: Container Command Execution Shell
  desc: Detect shell execution in containers (interactive or command)
  condition: >
    (spawned_process and container.id != host)
    and (proc.name=sh or proc.name=bash or proc.name=zsh
         or proc.name=ash or proc.name=dash)
    and (proc.cmdline contains -c or proc.cmdline contains -i)
  output: >
    SHELL EXECUTION IN CONTAINER (user=%user.name container=%container.name
    image=%container.image pid=%proc.pid cmdline=%proc.cmdline)
  priority: WARNING
  tags: [container, shell, mitre_execution]

- rule: Change Container Networking Configuration
  desc: Detect iptables or network config changes from container
  condition: >
    proc.name=iptables or proc.name=ip6tables or proc.name=ifconfig
    or proc.name=ip
    and container.id != host
    and proc.cmdline contains "iptables" or proc.cmdline contains "ip link"
  output: >
    NETWORK CONFIG CHANGE FROM CONTAINER (container=%container.name
    pid=%proc.pid cmdline=%proc.cmdline)
  priority: HIGH
  tags: [container, network, mitre_defense_evasion]

# ── Application Attack Detection Rules ─────────────────────

- rule: Web App Command Injection
  desc: Detect command injection attempts in the vulnerable app
  condition: >
    spawned_process and container.name=vuln-app
    and (proc.cmdline contains "shell" or proc.cmdline contains "exec"
         or proc.cmdline contains "; " or proc.cmdline contains "|" )
  output: >
    COMMAND INJECTION IN VULN-APP (pid=%proc.pid cmdline=%proc.cmdline
    user=%user.name)
  priority: CRITICAL
  tags: [web, injection, mitre_execution]

- rule: Web App SSRF Attempt
  desc: Detect SSRF (Server-Side Request Forgery) in vulnerable app
  condition: >
    spawned_process and container.name=vuln-app
    and (proc.cmdline contains "urllib" or proc.cmdline contains "requests")
    and (proc.cmdline contains "localhost" or proc.cmdline contains "127.0.0.1"
         or proc.cmdline contains "internal" or proc.cmdline contains "169.254")
  output: >
    SSRF IN VULN-APP (pid=%proc.pid cmdline=%proc.cmdline)
  priority: HIGH
  tags: [web, ssrf, mitre_discovery]

- rule: Unsafe Deserialization Attempt
  desc: Detect use of unsafe eval/deserialization in the app
  condition: >
    spawned_process and container.name=vuln-app
    and proc.cmdline contains "eval(" and proc.cmdline contains "base64"
  output: >
    UNSAFE DESERIALIZATION IN VULN-APP (pid=%proc.pid cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [web, deserialization, mitre_execution]

- rule: File Read Outside Allowed Paths
  desc: Detect file reads outside allowed directory paths
  condition: >
    open_read and container.name=vuln-app
    and (fd.name startswith /etc or fd.name startswith /proc
         or fd.name startswith /root or fd.name startswith /var/lib)
    and not fd.name startswith /etc/passwd
    and not fd.name startswith /etc/hostname
  output: >
    UNAUTHORIZED FILE READ (file=%fd.name pid=%proc.pid cmdline=%proc.cmdline)
  priority: HIGH
  tags: [web, file_disclosure, mitre_discovery]

# ── Generic Suspicious Behavior ──────────────────────────

- rule: Debugfs Mount Attempt
  desc: Detect debugfs mount from container (potential escape)
  condition: >
    evt.type=mount and container.id != host
    and evt.arg[0] contains debugfs
  output: >
    DEBUGFS MOUNT FROM CONTAINER (container=%container.name
    pid=%proc.pid cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [container, escape, mitre_privilege_escalation]

- rule: Kernel Module Loading from Container
  desc: Detect kernel module loading (potential escape via rootkit)
  condition: >
    (proc.name=insmod or proc.name=modprobe or proc.name=kmod)
    and container.id != host
  output: >
    KERNEL MODULE LOAD FROM CONTAINER (module=%proc.cmdline
    container=%container.name pid=%proc.pid)
  priority: CRITICAL
  tags: [container, kernel, rootkit, mitre_persistence]

- rule: Container CPU/Memory Exhaustion
  desc: Detect fork bombs or resource exhaustion from containers
  condition: >
    evt.type=fork or evt.type=clone
    and container.id != host
    and proc.pcmdline contains "fork" or proc.cmdline contains "fork"
  output: >
    FORK BOMB/RESOURCE EXHAUSTION (container=%container.name
    pid=%proc.pid cmdline=%proc.cmdline)
  priority: WARNING
  tags: [container, dos, mitre_impact]
